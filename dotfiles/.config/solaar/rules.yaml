%YAML 1.3
---
- Key: [Back Button, pressed]
- KeyPress:
  - Escape
  - click
...
---
- Key: [Forward Button, pressed]
- KeyPress:
  - Print
  - click
...
---
- Key: [Mouse Gesture Button, pressed]
- KeyPress:
  - Super_L
  - click
...
---
- Test: [thumb_wheel_up, 31]
- KeyPress:
  - [Super_L, Left]
  - click
...
---
- Test: [thumb_wheel_down, 31]
- KeyPress:
  - [Super_L, Right]
  - click
...
